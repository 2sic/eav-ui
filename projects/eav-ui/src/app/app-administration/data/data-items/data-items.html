<div class="actions-component">
  <a
    class="eav-grid-action-button default-link highlight"
    matRipple
    tippy="{{ value }} items"
    href="javascript:void(0)"
    (click)="do('openItems')">
    <div class="text-icon">{{ value }}</div>
  </a>

  <!-- TODO: fix color again -->
  <a
    class="eav-grid-action-button default-link highlight"
    matRipple
    tippy="Add item"
    href="javascript:void(0)"
    (click)="do('addItem')">
    <mat-icon>add</mat-icon>
  </a>
</div>
