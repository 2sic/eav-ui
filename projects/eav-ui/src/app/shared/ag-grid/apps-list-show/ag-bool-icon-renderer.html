<div class="icon-container">
  @if (cellData.url) {
    <a [href]="cellData.url" target="_blank">
      <ng-container *ngTemplateOutlet="showIcon"></ng-container>
    </a>
  } @else {
    <div class="icon-cell icon" [ngClass]="{'clickable': cellData.clickable }" [tippy]="cellData.tooltip">
      <mat-icon>{{ cellData.icon }}</mat-icon>
    </div>
  }
</div>

<ng-template #showIcon>
  <div class="icon-cell icon" [ngClass]="{'clickable': cellData.clickable }" [tippy]="cellData.tooltip">
    <mat-icon>{{ cellData.icon }}</mat-icon>
  </div>
</ng-template>
